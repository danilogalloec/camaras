services:
  db:
    image: postgres:15
    container_name: camaras-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: camaras
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - camaras_net

  backend:
    build:
      context: ./backend
    container_name: camaras-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
    networks:
      - camaras_net

  frontend:
    build:
      context: ./frontend
    container_name: camaras-frontend
    command: npm start
    volumes:
      - ./frontend:/app
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - camaras_net

  caddy:
    image: caddy:2
    container_name: camaras-caddy   # ✅ ahora tiene nombre único
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - camaras_net

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  camaras_net:
    driver: bridge
